# Fly.io config for NALP - single source at apps/web/fly.toml
app = "nalp"
primary_region = "cdg"

[build]
  dockerfile = "../../Dockerfile"

[env]
  APP_DEBUG = "false"
  APP_ENV = "production"
  CACHE_STORE = "file"
  DB_CONNECTION = "sqlite"
  DB_DATABASE = "/var/www/html/database/database.sqlite"
  QUEUE_CONNECTION = "sync"
  SESSION_DRIVER = "file"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
  memory_mb = 512
