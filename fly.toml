# Use apps/web/fly.toml for deploy. This file aligns with same app.
# fly deploy . --config apps/web/fly.toml --app nalp-patient-frog-3104
app = "nalp"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  DB_CONNECTION = "sqlite"
  CACHE_STORE = "database"
  SESSION_DRIVER = "database"
  QUEUE_CONNECTION = "sync"

[deploy]
  release_command = "php artisan migrate --force || true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
