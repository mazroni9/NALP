name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  laravel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nalp_test
          POSTGRES_USER: nalp
          POSTGRES_PASSWORD: nalp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, intl, redis, zip, bcmath
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Copy .env
        run: cp .env.example .env && php artisan key:generate

      - name: Configure database
        run: |
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=pgsql/' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=.*/DB_PORT=5432/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=nalp_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=nalp/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=nalp/' .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run PHP Lint
        run: ./vendor/bin/pint --test

      - name: Run tests
        run: php artisan test
